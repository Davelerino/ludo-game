[plugin]

name="Ludo Board Generator"
description="Generates the logical and visual structure of a Ludo board (52-cell ring lane, 4 start tiles, 4 home lanes) on a GridMap, and exposes it as a reusable BoardData resource for gameplay systems (pawns, RuleEngine, AI, multiplayer). Contains no gameplay logic (no pawns, dice, capture or win rules)."
author="Ludo3D Tools"
version="1.0.0"
script="plugin.gd"
